<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMR Registered Namespaces Registry</title>
    <style>
        /* Base Styles */
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 2rem; 
            background: #f9fafb; 
            color: #1f2937; 
            max-width: 1100px; 
            margin: auto; 
        }

        h1 { 
            font-size: 1.75rem; 
            margin-bottom: 0.5rem; 
            color: #111827;
        }

        /* The Raw Data Link Labeling */
        .source-notice {
            margin-bottom: 2rem;
            padding: 14px;
            background: #f3f4f6;
            border-left: 4px solid #374151;
            color: #374151;
            font-size: 0.95rem;
        }

        .raw-data-link { 
            font-weight: 700; 
            color: #2563eb; 
            text-decoration: underline; 
        }

        /* Table Styling */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }

        th, td { 
            padding: 14px 16px; 
            text-align: left; 
            border-bottom: 1px solid #e5e7eb;
            /* Vertically align all content to the top */
            vertical-align: top; 
        }

        th { 
            background: #f3f4f6; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: #6b7280; 
            font-weight: 600;
        }

        tr:hover { background: #f8fafc; }

        /* Content Styling - Neutral Gray Theme */
        code { 
            background: #e5e7eb; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-family: ui-monospace, monospace; 
            font-size: 0.9em; 
            color: #1f2937; /* Dark text instead of red */
        }

        .link-container a { 
            display: block; 
            color: #2563eb; 
            text-decoration: none; 
            font-size: 0.85rem; 
            margin-bottom: 6px;
            white-space: nowrap;
        }

        .link-container a:hover { 
            text-decoration: underline; 
            color: #1e40af;
        }

        .error-msg { 
            color: #dc2626; 
            padding: 40px; 
            text-align: center; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <h1>Registered Namespaces Registry</h1>
    
    <div class="source-notice">
        The raw data for this table can be found at: 
        <a href="data.json" class="raw-data-link" target="_blank">data.json</a>
    </div>

    <table id="registry-table">
        <thead>
            <tr>
                <th scope="col">Namespace</th>
                <th scope="col">Name</th>
                <th scope="col">Description</th>
                <th scope="col">Resources</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="4" style="text-align:center; padding: 40px;">Initializing registry...</td></tr>
        </tbody>
    </table>

    <script>
        async function loadRegistry() {
            const tbody = document.getElementById('table-body');
            
            try {
                const response = await fetch('./data.json');
                
                if (!response.ok) {
                    throw new Error(`Data source not found (HTTP ${response.status})`);
                }

                const data = await response.json();

                tbody.innerHTML = data.map(item => {
                    // Logic to handle both singular "url" and plural/array formats
                    const raw = item.url || item.urls || [];
                    const list = Array.isArray(raw) ? raw : [raw];

                    const links = list.map(link => {
                        try {
                            const clean = String(link).trim();
                            if (!clean) return '';
                            const domain = new URL(clean).hostname.replace('www.', '');
                            return `<a href="${clean}" target="_blank" rel="noopener">${domain}</a>`;
                        } catch (e) {
                            return `<a href="${link}" target="_blank" rel="noopener">Link</a>`;
                        }
                    }).filter(h => h).join('');

                    return `
                        <tr>
                            <td><code>${item.id || ''}</code></td>
                            <td><strong>${item.name || ''}</strong></td>
                            <td>${item.description || ''}</td>
                            <td class="link-container">${links || '—'}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="error-msg">Error: ${err.message}</td></tr>`;
            }
        }

        loadRegistry();
    </script>
</body>
</html>
