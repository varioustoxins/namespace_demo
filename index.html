<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMR Registered Namespaces</title>
    <style>
        body { font-family: -apple-system, sans-serif; line-height: 1.6; padding: 40px; background: #f4f7f6; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background-color: #f9f9f9; }
        code { background: #eee; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Registry: Registered Namespaces</h1>
    <p>This table is generated dynamically from <code>data.json</code>.</p>

    <table>
        <thead>
            <tr>
                <th>Namespace</th>
                <th>Name</th>
                <th>Description</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="4">Loading registry data...</td></tr>
        </tbody>
    </table>

    <script>
        async function buildTable() {
            const tbody = document.getElementById('table-body');
            try {
                // 1. Fetch the JSON file
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error("Data file not found");
                
                const data = await response.json();

                // 2. Build the rows using your specific keys: id, name, description, url
                const html = data.map(row => `
                    <tr>
                        <td><code>${row.id}</code></td>
                        <td><strong>${row.name}</strong></td>
                        <td>${row.description}</td>
                        <td><a href="${row.url}" target="_blank" rel="noopener">${row.url}</a></td>
                    </tr>
                `).join('');

                // 3. Inject into the table
                tbody.innerHTML = html;

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:red">Error: ${error.message}</td></tr>`;
                console.error('Fetch error:', error);
            }
        }

        // Run the function
        buildTable();
    </script>
</body>
</html>
