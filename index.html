<script>
    async function loadRegistry() {
        const tbody = document.getElementById('table-body');
        try {
            // 1. Fetch the data
            const response = await fetch('./data.json');
            if (!response.ok) throw new Error('Could not find data.json');
            
            const data = await response.json();

            // 2. Map using the CORRECT keys from your translated JSON
            // row.id          -> "nef"
            // row.name        -> "NEF Standard"
            // row.description -> "Data Exchange"
            // row.url         -> "https://..."
            
            tbody.innerHTML = data.map(row => `
                <tr>
                    <td><code>${row.id}</code></td>
                    <td><strong>${row.name}</strong></td>
                    <td>${row.description}</td>
                    <td><a href="${row.url}" class="btn" target="_blank" rel="noopener">Visit Site</a></td>
                </tr>
            `).join('');

        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Error: ${error.message}</td></tr>`;
            console.error('Registry Load Error:', error);
        }
    }

    loadRegistry();
</script>
