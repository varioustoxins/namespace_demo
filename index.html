<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMR Registered Namespaces</title>
    <style>
        body { font-family: -apple-system, sans-serif; line-height: 1.6; padding: 40px; background: #f4f7f6; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background-color: #f9f9f9; }
        code { background: #eee; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Registry: Registered Namespaces</h1>
    <p>This table is generated dynamically from <code>data.json</code>.</p>

    <table>
        <thead>
            <tr>
                <th>Namespace</th>
                <th>Name</th>
                <th>Description</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="4">Loading registry data...</td></tr>
        </tbody>
    </table>

    <script>
    async function init() {
        const display = document.getElementById('table-body');
        
        try {
            const response = await fetch('./data.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();

            display.innerHTML = data.map(item => {
                // Logic: check 'urls' first, then 'url', then default to empty array
                const raw = item.urls || item.url || [];
                const list = Array.isArray(raw) ? raw : [raw];
                
                const links = list
                    .filter(url => url && url.startsWith('http')) // Security check
                    .map(url => {
                        try {
                            const domain = new URL(url).hostname.replace('www.', '');
                            return `<a href="${url}" target="_blank">${domain}</a>`;
                        } catch(e) {
                            return `<a href="${url}" target="_blank">Link</a>`;
                        }
                    })
                    .join('<br>');

                return `
                    <tr>
                        <td><code>${item.id}</code></td>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.description}</td>
                        <td>${links}</td>
                    </tr>
                `;
            }).join('');

        } catch (e) {
            display.innerHTML = `<tr><td colspan="4" style="color:red">Error: ${e.message}</td></tr>`;
        }
    }

    init();
</script>
</body>
</html>
